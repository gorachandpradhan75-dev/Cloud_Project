<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Storage</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            color: #333;
        }

        h1 {
            text-align: center;
            color: white;
            margin-top: 40px;
        }

        .container {
            width: 60%;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 25px;
        }

        .upload-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input[type="file"] {
            padding: 8px;
        }

        button {
            background: #667eea;
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f4f6ff;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .actions a {
            margin-left: 10px;
            text-decoration: none;
            font-size: 14px;
        }

        .download {
            color: green;
        }

        .delete {
            color: red;
        }
    </style>
</head>

<body>

<h1>☁ Cloud Storage Dashboard</h1>

<div class="container">

    <!-- Upload Section -->
    <div class="card">
        <h3>Upload File</h3>
        <form action="/upload" method="post" enctype="multipart/form-data" class="upload-box">
            <input type="file" name="file">
            <button type="submit">Upload</button>
        </form>
    </div>

    <!-- Files Section -->
    <div class="card">
        <h3>Files</h3>

        {% for file in files %}
        <div class="file-item">
            <span>{{ file }}</span>

            <div class="actions">
                <a href="/download/{{ file }}" class="download">Download</a>
                <a href="/delete/{{ file }}" class="delete">Delete</a>
            </div>
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
